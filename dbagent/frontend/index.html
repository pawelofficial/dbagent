<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DBAgent Chat</title>
    <style>
        :root {
            --bg: #0f1117;
            --surface: #1a1d27;
            --border: #2a2d3a;
            --text: #e4e4e7;
            --muted: #71717a;
            --accent: #6366f1;
            --accent-hover: #818cf8;
            --error: #ef4444;
            --sql-bg: #1e2030;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            padding: 1rem 1.5rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }
        header h1 { font-size: 1.1rem; font-weight: 600; }
        #status {
            margin-left: auto;
            font-size: 0.75rem;
            color: var(--muted);
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }
        #status .dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: var(--muted);
        }
        #status .dot.connected { background: #22c55e; }

        #chat {
            flex: 1;
            overflow-y: auto;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .msg { max-width: 720px; width: 100%; margin: 0 auto; }
        .msg.user .bubble {
            background: var(--accent);
            color: #fff;
            border-radius: 1rem 1rem 0.25rem 1rem;
            padding: 0.75rem 1rem;
            margin-left: auto;
            width: fit-content;
        }
        .msg.agent .bubble {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 1rem 1rem 1rem 0.25rem;
            padding: 0.75rem 1rem;
        }

        .sql-block {
            background: var(--sql-bg);
            border: 1px solid var(--border);
            border-radius: 0.5rem;
            padding: 0.75rem 1rem;
            font-family: "Fira Code", "Cascadia Code", monospace;
            font-size: 0.85rem;
            white-space: pre-wrap;
            margin: 0.5rem 0;
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
            margin: 0.5rem 0;
        }
        .data-table th, .data-table td {
            border: 1px solid var(--border);
            padding: 0.4rem 0.6rem;
            text-align: left;
        }
        .data-table th { background: var(--sql-bg); color: var(--muted); }

        .step-label {
            font-size: 0.7rem;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.25rem;
        }

        #input-bar {
            border-top: 1px solid var(--border);
            padding: 1rem 1.5rem;
            display: flex;
            gap: 0.75rem;
            max-width: 780px;
            width: 100%;
            margin: 0 auto;
        }
        #input-bar input {
            flex: 1;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 0.5rem;
            padding: 0.6rem 1rem;
            color: var(--text);
            font-size: 0.95rem;
            outline: none;
        }
        #input-bar input:focus { border-color: var(--accent); }
        #input-bar button {
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 0.5rem;
            padding: 0.6rem 1.5rem;
            font-size: 0.95rem;
            cursor: pointer;
        }
        #input-bar button:hover { background: var(--accent-hover); }
    </style>
</head>

</html>
