<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DBAgent</title>
    <style>
        :root {
            --bg: #0f1117;
            --surface: #1a1d27;
            --surface2: #22252f;
            --border: #2a2d3a;
            --text: #e4e4e7;
            --muted: #71717a;
            --accent: #6366f1;
            --accent-hover: #818cf8;
            --accent-subtle: rgba(99,102,241,0.12);
            --error: #ef4444;
            --success: #22c55e;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            overflow: hidden;
        }

        /* ---- Login screen ---- */
        #login-screen {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        .login-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 1rem;
            padding: 2.5rem 2rem;
            width: 360px;
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
        }
        .login-card h1 {
            font-size: 1.3rem;
            font-weight: 700;
            text-align: center;
        }
        .login-card .subtitle {
            text-align: center;
            color: var(--muted);
            font-size: 0.85rem;
            margin-top: -0.75rem;
        }
        .field label {
            display: block;
            font-size: 0.8rem;
            color: var(--muted);
            margin-bottom: 0.35rem;
        }
        .field input {
            width: 100%;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 0.5rem;
            padding: 0.6rem 0.75rem;
            color: var(--text);
            font-size: 0.9rem;
            outline: none;
            transition: border-color 0.15s;
        }
        .field input:focus { border-color: var(--accent); }
        .login-btn {
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 0.5rem;
            padding: 0.65rem;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.15s;
        }
        .login-btn:hover { background: var(--accent-hover); }
        .login-error {
            color: var(--error);
            font-size: 0.8rem;
            text-align: center;
            min-height: 1.2em;
        }

        /* ---- App shell ---- */
        #app-shell {
            display: none;
            height: 100vh;
        }
        #app-shell.visible {
            display: grid;
            grid-template-columns: 260px 1fr;
        }

        /* ---- Sidebar ---- */
        .sidebar {
            background: var(--surface);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        .sidebar-header {
            padding: 1rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .sidebar-header h2 { font-size: 1rem; font-weight: 600; }
        .new-chat-btn {
            margin-left: auto;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 0.4rem;
            padding: 0.35rem 0.7rem;
            font-size: 0.78rem;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.15s;
        }
        .new-chat-btn:hover { background: var(--accent-hover); }

        .chat-list {
            flex: 1;
            overflow-y: auto;
            padding: 0.5rem;
        }
        .chat-item {
            padding: 0.6rem 0.75rem;
            border-radius: 0.5rem;
            cursor: pointer;
            transition: background 0.12s;
            margin-bottom: 2px;
        }
        .chat-item:hover { background: var(--surface2); }
        .chat-item.active { background: var(--accent-subtle); }
        .chat-item .chat-title {
            font-size: 0.85rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .chat-item .chat-meta {
            font-size: 0.7rem;
            color: var(--muted);
            margin-top: 0.15rem;
        }

        .sidebar-footer {
            padding: 0.75rem 1rem;
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.8rem;
            color: var(--muted);
        }
        .sidebar-footer .user-badge {
            background: var(--accent);
            color: #fff;
            width: 28px; height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            font-weight: 700;
        }
        .logout-btn {
            margin-left: auto;
            background: none;
            border: 1px solid var(--border);
            color: var(--muted);
            border-radius: 0.35rem;
            padding: 0.25rem 0.5rem;
            font-size: 0.72rem;
            cursor: pointer;
            transition: color 0.15s, border-color 0.15s;
        }
        .logout-btn:hover { color: var(--error); border-color: var(--error); }

        /* ---- Main chat area ---- */
        .main {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        .main-header {
            padding: 0.85rem 1.5rem;
            border-bottom: 1px solid var(--border);
            font-size: 0.95rem;
            font-weight: 600;
            display: flex;
            align-items: center;
        }
        .main-header .conn-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: var(--muted);
            margin-left: auto;
        }
        .main-header .conn-dot.ok { background: var(--success); }

        #messages {
            flex: 1;
            overflow-y: auto;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 0.85rem;
        }
        #messages:empty::after {
            content: "Send a message to start.";
            color: var(--muted);
            text-align: center;
            margin: auto;
            font-size: 0.95rem;
        }

        .msg {
            max-width: 680px;
            width: 100%;
            margin: 0 auto;
            display: flex;
        }
        .msg.user { justify-content: flex-end; }
        .msg.agent { justify-content: flex-start; }
        .bubble {
            padding: 0.65rem 1rem;
            line-height: 1.5;
            font-size: 0.9rem;
            word-break: break-word;
        }
        .msg.user .bubble {
            background: var(--accent);
            color: #fff;
            border-radius: 1rem 1rem 0.25rem 1rem;
        }
        .msg.agent .bubble {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 1rem 1rem 1rem 0.25rem;
        }

        .typing-indicator {
            display: none;
            max-width: 680px;
            width: 100%;
            margin: 0 auto;
        }
        .typing-indicator.visible { display: flex; }
        .typing-indicator .bubble {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 1rem 1rem 1rem 0.25rem;
            padding: 0.65rem 1.2rem;
            display: flex;
            gap: 0.3rem;
        }
        .typing-indicator .dot {
            width: 7px; height: 7px;
            background: var(--muted);
            border-radius: 50%;
            animation: blink 1.4s infinite both;
        }
        .typing-indicator .dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator .dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes blink {
            0%, 80%, 100% { opacity: 0.3; }
            40% { opacity: 1; }
        }

        #input-bar {
            border-top: 1px solid var(--border);
            padding: 0.85rem 1.5rem;
            display: flex;
            gap: 0.65rem;
            max-width: 740px;
            width: 100%;
            margin: 0 auto;
        }
        #input-bar input {
            flex: 1;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 0.5rem;
            padding: 0.6rem 1rem;
            color: var(--text);
            font-size: 0.9rem;
            outline: none;
            transition: border-color 0.15s;
        }
        #input-bar input:focus { border-color: var(--accent); }
        #input-bar button {
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 0.5rem;
            padding: 0.6rem 1.3rem;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.15s;
        }
        #input-bar button:hover { background: var(--accent-hover); }
        #input-bar button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

<!-- ================= LOGIN ================= -->
<div id="login-screen">
    <div class="login-card">
        <h1>DBAgent</h1>
        <p class="subtitle">Sign in to continue</p>
        <div class="field">
            <label for="login-user">Username</label>
            <input id="login-user" type="text" autocomplete="username" />
        </div>
        <div class="field">
            <label for="login-pass">Password</label>
            <input id="login-pass" type="password" autocomplete="current-password" />
        </div>
        <p class="login-error" id="login-error"></p>
        <button class="login-btn" id="login-btn">Sign in</button>
    </div>
</div>

<!-- ================= APP SHELL ================= -->
<div id="app-shell">

    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="sidebar-header">
            <h2>Chats</h2>
            <button class="new-chat-btn" id="new-chat-btn">+ New</button>
        </div>
        <div class="chat-list" id="chat-list"></div>
        <div class="sidebar-footer">
            <span class="user-badge" id="user-badge"></span>
            <span id="user-name"></span>
            <button class="logout-btn" id="logout-btn">Log out</button>
        </div>
    </aside>

    <!-- Main chat -->
    <div class="main">
        <div class="main-header">
            <span id="chat-title">New chat</span>
            <span class="conn-dot" id="conn-dot"></span>
        </div>
        <div id="messages"></div>
        <div class="typing-indicator" id="typing">
            <div class="bubble"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>
        </div>
        <div id="input-bar">
            <input id="question" type="text" placeholder="Ask something…" autocomplete="off" />
            <button id="send-btn">Send</button>
        </div>
    </div>
</div>

<script>
const API = "";

let token = null;
let username = null;
let currentChatId = null;
let ws = null;
let sending = false;
let loggedIn = false;

/* ================ DOM refs ================ */

const $loginScreen = document.getElementById("login-screen");
const $appShell    = document.getElementById("app-shell");
const $loginUser   = document.getElementById("login-user");
const $loginPass   = document.getElementById("login-pass");
const $loginBtn    = document.getElementById("login-btn");
const $loginError  = document.getElementById("login-error");
const $chatList    = document.getElementById("chat-list");
const $messages    = document.getElementById("messages");
const $question    = document.getElementById("question");
const $sendBtn     = document.getElementById("send-btn");
const $chatTitle   = document.getElementById("chat-title");
const $typing      = document.getElementById("typing");
const $newChatBtn  = document.getElementById("new-chat-btn");
const $logoutBtn   = document.getElementById("logout-btn");
const $userBadge   = document.getElementById("user-badge");
const $userName    = document.getElementById("user-name");
const $connDot     = document.getElementById("conn-dot");

/* ================ Auth ================ */

function headers() {
    return { "Content-Type": "application/json", Authorization: "Bearer " + token };
}

async function doLogin() {
    $loginError.textContent = "";
    const u = $loginUser.value.trim();
    const p = $loginPass.value;
    if (!u || !p) { $loginError.textContent = "Enter username and password."; return; }

    try {
        const res = await fetch(API + "/api/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ username: u, password: p }),
        });
        if (!res.ok) {
            const err = await res.json().catch(() => ({}));
            $loginError.textContent = err.detail || "Login failed.";
            return;
        }
        const data = await res.json();
        token = data.token;
        username = data.username;
        sessionStorage.setItem("token", token);
        sessionStorage.setItem("username", username);
        enterApp();
    } catch (e) {
        $loginError.textContent = "Server unreachable.";
    }
}

$loginBtn.addEventListener("click", doLogin);
$loginPass.addEventListener("keydown", (e) => { if (e.key === "Enter") doLogin(); });
$loginUser.addEventListener("keydown", (e) => { if (e.key === "Enter") $loginPass.focus(); });

function logout() {
    loggedIn = false;
    token = null;
    username = null;
    currentChatId = null;
    sessionStorage.clear();
    if (ws) {
        ws.onclose = null;
        ws.onmessage = null;
        ws.close();
        ws = null;
    }
    $connDot.classList.remove("ok");
    $appShell.classList.remove("visible");
    $loginScreen.style.display = "flex";
    $loginUser.value = "";
    $loginPass.value = "";
    $loginError.textContent = "";
}

$logoutBtn.addEventListener("click", logout);

/* ================ App entry ================ */

function enterApp() {
    loggedIn = true;
    $loginScreen.style.display = "none";
    $appShell.classList.add("visible");
    $userBadge.textContent = username[0].toUpperCase();
    $userName.textContent = username;
    connectWS();
    refreshChatList();
}

/* ================ WebSocket ================ */

function connectWS() {
    const proto = location.protocol === "https:" ? "wss:" : "ws:";
    ws = new WebSocket(`${proto}//${location.host}/ws/query`);

    ws.addEventListener("open", () => {
        $connDot.classList.add("ok");
        ws.send(JSON.stringify({ token }));
    });

    ws.addEventListener("message", (e) => {
        const data = JSON.parse(e.data);

        if (data.error === "unauthorized") { logout(); return; }

        if (data.chat_id && data.chat_id !== currentChatId) {
            currentChatId = data.chat_id;
            refreshChatList();
        }

        if (data.step === "done" && data.payload) {
            addBubble(data.payload.answer, "agent");
        }

        sending = false;
        $sendBtn.disabled = false;
        $typing.classList.remove("visible");
    });

    ws.addEventListener("close", () => {
        $connDot.classList.remove("ok");
        if (loggedIn) setTimeout(connectWS, 2000);
    });
}

/* ================ Chat list ================ */

async function refreshChatList() {
    try {
        const res = await fetch(API + "/api/chats", { headers: headers() });
        if (!res.ok) return;
        const chats = await res.json();
        $chatList.innerHTML = "";
        for (const c of chats) {
            const el = document.createElement("div");
            el.className = "chat-item" + (c.id === currentChatId ? " active" : "");
            el.innerHTML = `<div class="chat-title">${esc(c.title)}</div>
                            <div class="chat-meta">${c.message_count} messages</div>`;
            el.addEventListener("click", () => loadChat(c.id));
            $chatList.appendChild(el);
        }
    } catch {}
}

async function loadChat(chatId) {
    currentChatId = chatId;
    try {
        const res = await fetch(API + "/api/chats/" + chatId, { headers: headers() });
        if (!res.ok) return;
        const chat = await res.json();
        $chatTitle.textContent = chat.title;
        $messages.innerHTML = "";
        for (const m of chat.messages) {
            addBubble(m.content, m.role);
        }
        refreshChatList();
    } catch {}
}

$newChatBtn.addEventListener("click", () => {
    currentChatId = null;
    $chatTitle.textContent = "New chat";
    $messages.innerHTML = "";
    refreshChatList();
});

/* ================ Sending ================ */

function send() {
    const q = $question.value.trim();
    if (!q || sending) return;

    addBubble(q, "user");
    $question.value = "";
    sending = true;
    $sendBtn.disabled = true;
    $typing.classList.add("visible");
    scrollDown();

    if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ question: q, chat_id: currentChatId }));
    } else {
        fetchFallback(q);
    }
}

async function fetchFallback(q) {
    try {
        const res = await fetch(API + "/api/query", {
            method: "POST",
            headers: headers(),
            body: JSON.stringify({ question: q, chat_id: currentChatId }),
        });
        const data = await res.json();
        if (data.chat_id) currentChatId = data.chat_id;
        addBubble(data.answer || data.detail || "Error", data.answer ? "agent" : "error");
        refreshChatList();
    } catch {
        addBubble("Could not reach server.", "agent");
    }
    sending = false;
    $sendBtn.disabled = false;
    $typing.classList.remove("visible");
}

$sendBtn.addEventListener("click", send);
$question.addEventListener("keydown", (e) => { if (e.key === "Enter") send(); });

/* ================ Helpers ================ */

function addBubble(text, role) {
    const wrap = document.createElement("div");
    wrap.className = "msg " + role;
    const bubble = document.createElement("div");
    bubble.className = "bubble";
    bubble.textContent = text;
    wrap.appendChild(bubble);
    $messages.appendChild(wrap);
    scrollDown();
}

function scrollDown() {
    requestAnimationFrame(() => { $messages.scrollTop = $messages.scrollHeight; });
}

function esc(s) {
    const d = document.createElement("div");
    d.textContent = s;
    return d.innerHTML;
}

/* ================ Auto-resume session ================ */

(function init() {
    const t = sessionStorage.getItem("token");
    const u = sessionStorage.getItem("username");
    if (t && u) {
        token = t;
        username = u;
        enterApp();
    }
})();
</script>
</body>
</html>
