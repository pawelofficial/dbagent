<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>DB Agent – Architecture</title>
  <style>
    * { box-sizing: border-box; margin: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      display: flex;
      height: 100vh;
    }
    aside {
      width: 240px;
      background: #16213e;
      padding: 1rem;
      overflow-y: auto;
      flex-shrink: 0;
      border-right: 1px solid #333;
    }
    aside h2 { font-size: 0.85rem; text-transform: uppercase; color: #7ec8e3; margin-bottom: 0.75rem; }
    aside button {
      display: block;
      width: 100%;
      text-align: left;
      background: transparent;
      color: #ccc;
      border: none;
      padding: 0.5rem 0.75rem;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.9rem;
      margin-bottom: 0.25rem;
    }
    aside button:hover { background: #1a1a3e; }
    aside button.active { background: #0f3460; color: #fff; }
    main {
      flex: 1;
      overflow-y: auto;
      padding: 2rem;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    h1 { color: #7ec8e3; margin-bottom: 1rem; font-size: 1.3rem; }
    #diagram {
      background: #fff;
      border-radius: 8px;
      padding: 2rem;
      width: 100%;
      max-width: 1000px;
      min-height: 200px;
      text-align: center;
    }
    .empty { color: #888; font-style: italic; padding: 3rem; }
  </style>
</head>
<body>
  <aside>
    <h2>Diagrams</h2>
    <div id="diagram-list"></div>
  </aside>
  <main>
    <h1 id="title">Select a diagram</h1>
    <div id="diagram"><p class="empty">Pick a diagram from the sidebar.</p></div>
  </main>

  <script type="module">
    import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';
    mermaid.initialize({ startOnLoad: false, theme: 'default' });

    const listEl = document.getElementById('diagram-list');
    const diagramEl = document.getElementById('diagram');
    const titleEl = document.getElementById('title');

    // Fetch diagram index from the server
    const res = await fetch('/api/diagrams');
    const diagrams = await res.json();  // ["flow", "sequence", ...]

    diagrams.forEach(name => {
      const btn = document.createElement('button');
      btn.textContent = name;
      btn.addEventListener('click', () => loadDiagram(name, btn));
      listEl.appendChild(btn);
    });

    async function loadDiagram(name, btn) {
      // highlight active
      listEl.querySelectorAll('button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');

      const resp = await fetch(`/api/diagrams/${encodeURIComponent(name)}`);
      const spec = await resp.text();

      titleEl.textContent = name;
      diagramEl.innerHTML = '';

      const { svg } = await mermaid.render('mmd-' + Date.now(), spec);
      diagramEl.innerHTML = svg;
    }

    // Auto-select first diagram
    if (listEl.firstChild) listEl.firstChild.click();
  </script>
</body>
</html>
